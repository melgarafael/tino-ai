<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Tino — curador pessoal de IA</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400;1,6..72,500&family=Inter:wght@400;450;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #13110f;
    --bg-elev: #1a1815;
    --bg-card: #181613;
    --text: #eae3d2;
    --text-dim: #9a9186;
    --text-faint: #6a6359;
    --accent: #d4a24c;
    --accent-dim: #8a6c34;
    --border: #2a2620;
    --border-soft: #211e1a;
    --high: #8fb174;
    --mid: #d4a24c;
    --low: #7a736a;
    --danger: #b76454;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--bg); color: var(--text); font-family: 'Inter', system-ui, sans-serif; font-size: 15px; line-height: 1.55; -webkit-font-smoothing: antialiased; }
  button { font: inherit; color: inherit; background: none; border: 0; cursor: pointer; }
  a { color: var(--accent); text-decoration: none; border-bottom: 1px solid var(--accent-dim); }
  a:hover { color: var(--text); border-color: var(--text); }
  code { font-family: ui-monospace, 'SF Mono', Menlo, monospace; font-size: 12px; }

  .container { max-width: 1080px; margin: 0 auto; padding: 48px 32px 96px; }

  .banner { background: var(--bg-elev); border-bottom: 1px solid var(--border); padding: 12px 32px; display: flex; align-items: center; justify-content: center; gap: 16px; font-size: 13px; color: var(--text-dim); position: sticky; top: 0; z-index: 10; }
  .banner.warn { border-bottom-color: var(--accent-dim); }
  .banner .dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }
  .banner.ok .dot { background: var(--high); box-shadow: 0 0 10px rgba(143,177,116,0.4); }
  .banner.warn .dot { background: var(--accent); box-shadow: 0 0 10px rgba(212,162,76,0.4); }
  .banner button { color: var(--accent); border: 1px solid var(--accent-dim); padding: 5px 12px; border-radius: 3px; font-size: 12px; transition: all .15s; }
  .banner button:hover { background: var(--accent); color: var(--bg); }
  .banner strong { color: var(--text); font-weight: 500; }

  header { padding-bottom: 28px; border-bottom: 1px solid var(--border); margin-bottom: 48px; }
  .brand-row { display: flex; align-items: baseline; justify-content: space-between; gap: 24px; flex-wrap: wrap; margin-bottom: 24px; }
  .brand { font-family: 'Newsreader', serif; font-weight: 500; font-size: 44px; letter-spacing: -0.02em; font-style: italic; }
  .brand::after { content: '.'; color: var(--accent); }
  .status { display: flex; align-items: center; gap: 10px; color: var(--text-dim); font-size: 13px; font-feature-settings: 'tnum'; flex-wrap: wrap; }
  .status .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--high); display: inline-block; box-shadow: 0 0 10px rgba(143,177,116,0.4); }
  .status .dot.mock { background: var(--accent); box-shadow: 0 0 10px rgba(212,162,76,0.4); }
  .status .sep { opacity: 0.4; }
  .status .btn-inline { padding: 3px 10px; font-size: 12px; }

  nav.tabs { display: flex; gap: 4px; }
  .tab { padding: 8px 14px; color: var(--text-dim); font-size: 14px; font-weight: 450; border-radius: 4px; transition: color .15s, background .15s; letter-spacing: 0.01em; }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--text); background: var(--bg-elev); }
  .tab .count { color: var(--text-faint); font-size: 12px; margin-left: 6px; font-feature-settings: 'tnum'; }
  .tab.active .count { color: var(--accent); }

  .view { display: none; }
  .view.active { display: block; animation: fade .25s ease; }
  @keyframes fade { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

  .calm { padding: 28px 32px; background: var(--bg-elev); border-left: 2px solid var(--accent); margin-bottom: 56px; border-radius: 0 4px 4px 0; }
  .calm p { font-family: 'Newsreader', serif; font-size: 22px; line-height: 1.45; font-weight: 400; color: var(--text); }
  .calm strong { color: var(--accent); font-weight: 500; font-style: italic; }
  .calm .sub { display: block; margin-top: 10px; font-family: 'Inter', sans-serif; font-size: 13px; color: var(--text-dim); font-style: normal; }

  .section-head { display: flex; align-items: baseline; justify-content: space-between; margin: 48px 0 20px; padding-bottom: 12px; border-bottom: 1px solid var(--border-soft); }
  .section-head:first-child { margin-top: 0; }
  .section-head h2 { font-family: 'Newsreader', serif; font-weight: 500; font-size: 24px; letter-spacing: -0.01em; }
  .section-head h2 em { font-style: italic; color: var(--accent); font-weight: 400; }
  .section-head .hint { font-size: 12px; color: var(--text-faint); letter-spacing: 0.04em; text-transform: uppercase; }
  .section-head .hint code { color: var(--text-dim); }

  .cards { display: flex; flex-direction: column; gap: 4px; }
  .card { background: var(--bg-card); border: 1px solid var(--border-soft); border-radius: 4px; padding: 22px 26px; display: grid; grid-template-columns: 72px 1fr auto; gap: 24px; align-items: start; cursor: pointer; transition: border-color .15s, background .15s; }
  .card:hover { border-color: var(--border); background: var(--bg-elev); }
  .card.expanded { border-color: var(--accent-dim); background: var(--bg-elev); }

  .score-col { }
  .score { font-family: 'Newsreader', serif; font-style: italic; font-size: 46px; line-height: 1; font-weight: 500; font-feature-settings: 'tnum'; letter-spacing: -0.03em; }
  .score.high { color: var(--high); }
  .score.mid { color: var(--mid); }
  .score.low { color: var(--low); }
  .score-label { display: block; font-family: 'Inter', sans-serif; font-style: normal; font-size: 10px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-faint); margin-top: 4px; }

  .card-body h3 { font-family: 'Newsreader', serif; font-weight: 500; font-size: 20px; line-height: 1.3; letter-spacing: -0.005em; margin-bottom: 6px; }
  .card-meta { display: flex; gap: 10px; align-items: center; color: var(--text-dim); font-size: 12px; margin-bottom: 10px; flex-wrap: wrap; }
  .card-meta .source { color: var(--text); font-weight: 450; }
  .card-meta .sep { opacity: 0.4; }
  .verdict { color: var(--text-dim); font-size: 14px; line-height: 1.5; }
  .verdict .tag { display: inline-block; padding: 1px 8px; border-radius: 2px; font-size: 11px; font-weight: 500; letter-spacing: 0.04em; text-transform: uppercase; margin-right: 8px; vertical-align: 1px; }
  .tag.focar { background: rgba(143,177,116,0.15); color: var(--high); }
  .tag.considera { background: rgba(212,162,76,0.15); color: var(--accent); }
  .tag.acompanha { background: rgba(154,145,134,0.12); color: var(--text-dim); }
  .tag.ignore { background: rgba(122,115,106,0.1); color: var(--text-faint); }

  .card-action { color: var(--text-faint); font-size: 12px; align-self: center; white-space: nowrap; }
  .card.expanded .card-action .chev { transform: rotate(180deg); }
  .chev { display: inline-block; transition: transform .2s; margin-left: 4px; }

  .expand { grid-column: 1 / -1; margin-top: 20px; padding-top: 20px; border-top: 1px dashed var(--border); display: none; }
  .card.expanded .expand { display: block; animation: fade .2s ease; }
  .reason { background: rgba(212,162,76,0.04); border-left: 2px solid var(--accent-dim); padding: 16px 20px; margin-bottom: 20px; border-radius: 0 4px 4px 0; }
  .reason .label { font-size: 10px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); margin-bottom: 8px; }
  .reason p { font-family: 'Newsreader', serif; font-size: 16px; line-height: 1.6; color: var(--text); white-space: pre-wrap; }
  .reason .cite { display: block; margin-top: 10px; padding-top: 10px; border-top: 1px dashed var(--border); font-family: 'Inter', sans-serif; font-size: 12px; color: var(--text-dim); font-style: italic; }
  .reason .cite::before { content: '↳ '; color: var(--accent); font-style: normal; }

  /* ---------------- Why-it-matters v2 (5 blocos) ---------------- */
  .why { display: flex; flex-direction: column; gap: 0; margin-bottom: 20px; background: rgba(212,162,76,0.03); border: 1px solid var(--border-soft); border-left: 2px solid var(--accent-dim); border-radius: 0 4px 4px 0; overflow: hidden; }
  .why-block { padding: 14px 20px; border-bottom: 1px dashed var(--border-soft); }
  .why-block:last-child { border-bottom: 0; }
  .why-label { font-size: 10px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: var(--accent); margin-bottom: 6px; display: flex; align-items: center; gap: 8px; }
  .why-label .ic { display: inline-block; font-style: normal; color: var(--accent); }

  .why-tldr { background: rgba(212,162,76,0.08); }
  .why-tldr p { font-family: 'Newsreader', serif; font-style: italic; font-size: 18px; line-height: 1.4; color: var(--text); font-weight: 500; letter-spacing: -0.005em; }

  .why-narrative p { font-family: 'Newsreader', serif; font-size: 15px; line-height: 1.6; color: var(--text); white-space: pre-wrap; }

  .why-anchors ul { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 6px; }
  .why-anchors li { font-size: 13px; line-height: 1.45; color: var(--text-dim); padding-left: 16px; position: relative; }
  .why-anchors li::before { content: '↳'; position: absolute; left: 0; color: var(--accent-dim); font-size: 12px; }
  .why-anchors li code { font-family: ui-monospace, 'SF Mono', Menlo, monospace; font-size: 12px; color: var(--text); background: var(--bg); padding: 1px 5px; border-radius: 2px; border: 1px solid var(--border-soft); }
  .why-anchors li .snip { color: var(--text-faint); margin-left: 6px; font-style: italic; }

  .why-action { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .why-action > div { display: flex; flex-direction: column; gap: 4px; }
  .why-action p { font-size: 14px; color: var(--text); line-height: 1.45; }
  .why-action .a-next { color: var(--high); }
  .why-action .a-trade { color: var(--text-dim); }

  .why-meta { display: flex; gap: 18px; align-items: center; font-size: 11px; color: var(--text-faint); letter-spacing: 0.04em; padding: 10px 20px; background: var(--bg); }
  .why-meta .meta-item { display: flex; align-items: center; gap: 6px; }
  .why-meta .conf-bar { display: inline-flex; gap: 2px; }
  .why-meta .conf-bar i { width: 8px; height: 8px; border-radius: 50%; background: var(--border); display: inline-block; }
  .why-meta .conf-bar i.on { background: var(--accent); box-shadow: 0 0 6px rgba(212,162,76,0.4); }
  .why-meta strong { color: var(--text-dim); font-weight: 500; }

  @media (max-width: 720px) {
    .why-action { grid-template-columns: 1fr; }
    .why-meta { flex-wrap: wrap; gap: 10px; }
  }

  .expand-actions { display: flex; gap: 4px; flex-wrap: wrap; }
  .act { padding: 8px 14px; font-size: 13px; color: var(--text-dim); border: 1px solid var(--border); border-radius: 3px; transition: all .15s; background: transparent; }
  .act:hover { color: var(--text); border-color: var(--text-dim); }
  .act.primary { color: var(--accent); border-color: var(--accent-dim); }
  .act.primary:hover { background: var(--accent); color: var(--bg); border-color: var(--accent); }
  .act.primary.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }
  .act.primary.active::before { content: '★ '; }
  .act.primary:not(.active)::before { content: '☆ '; }
  .act.thumb.up.active { color: var(--high); border-color: var(--high); }
  .act.thumb.down.active { color: var(--danger); border-color: var(--danger); }

  .ignored { display: flex; flex-direction: column; gap: 2px; opacity: 0.7; }
  .ignored .card { grid-template-columns: 48px 1fr auto; padding: 14px 22px; gap: 20px; }
  .ignored .score { font-size: 28px; }
  .ignored .score-label { display: none; }
  .ignored h3 { font-size: 15px; font-family: 'Inter', sans-serif; font-weight: 500; }
  .ignored .card-meta { display: none; }
  .ignored .verdict { font-size: 12px; }

  .profile-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
  .profile-card { background: var(--bg-card); border: 1px solid var(--border-soft); border-radius: 4px; padding: 28px; }
  .profile-card h3 { font-family: 'Newsreader', serif; font-weight: 500; font-size: 20px; margin-bottom: 6px; letter-spacing: -0.005em; }
  .profile-card .caption { font-size: 12px; color: var(--text-faint); letter-spacing: 0.04em; text-transform: uppercase; margin-bottom: 20px; }
  .profile-card p { color: var(--text-dim); font-size: 14px; margin-bottom: 10px; white-space: pre-wrap; }
  .profile-card strong { color: var(--text); font-weight: 500; }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 14px; }
  .chip { padding: 4px 10px; background: var(--bg-elev); border: 1px solid var(--border); border-radius: 2px; font-size: 12px; color: var(--text-dim); }
  .chip.active { color: var(--accent); border-color: var(--accent-dim); background: rgba(212,162,76,0.08); }

  .empty { text-align: center; padding: 80px 20px; color: var(--text-dim); max-width: 640px; margin: 0 auto; }
  .empty h2 { font-family: 'Newsreader', serif; font-weight: 500; font-style: italic; font-size: 32px; margin-bottom: 16px; color: var(--text); letter-spacing: -0.01em; }
  .empty p { font-size: 15px; margin-bottom: 28px; }
  .empty .cta { display: inline-block; padding: 14px 28px; background: var(--accent); color: var(--bg); border: 0; border-radius: 3px; font-size: 14px; font-weight: 500; letter-spacing: 0.01em; cursor: pointer; transition: transform .1s; }
  .empty .cta:hover { transform: translateY(-1px); }
  .empty .sub { font-size: 12px; color: var(--text-faint); margin-top: 16px; }

  .setting-row { display: flex; justify-content: space-between; align-items: baseline; padding: 18px 0; border-bottom: 1px solid var(--border-soft); gap: 24px; }
  .setting-row:last-child { border: 0; }
  .setting-row .k { font-family: 'Newsreader', serif; font-size: 17px; font-weight: 500; flex: 1; }
  .setting-row .k small { display: block; font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 400; color: var(--text-faint); margin-top: 4px; font-style: normal; }
  .setting-row .v { color: var(--text-dim); font-size: 14px; font-feature-settings: 'tnum'; text-align: right; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; justify-content: flex-end; }
  .cmd { font-family: ui-monospace, 'SF Mono', Menlo, monospace; font-size: 12px; background: var(--bg-elev); padding: 4px 8px; border-radius: 3px; color: var(--accent); border: 1px solid var(--border); }
  .btn-inline { padding: 6px 12px; background: transparent; border: 1px solid var(--accent-dim); color: var(--accent); border-radius: 3px; font-size: 12px; transition: all .15s; cursor: pointer; }
  .btn-inline:hover { background: var(--accent); color: var(--bg); }
  .btn-inline.danger { border-color: var(--border); color: var(--text-dim); }
  .btn-inline.danger:hover { background: var(--danger); color: var(--text); border-color: var(--danger); }

  details { margin-top: 24px; background: var(--bg-card); border: 1px solid var(--border-soft); border-radius: 4px; padding: 20px 24px; }
  details summary { cursor: pointer; font-family: 'Newsreader', serif; font-size: 17px; font-weight: 500; color: var(--text); }
  details summary::marker { color: var(--accent); }
  details pre { margin-top: 16px; background: var(--bg); border: 1px solid var(--border); border-radius: 3px; padding: 16px; overflow-x: auto; font-size: 12px; line-height: 1.6; color: var(--text-dim); }

  footer { margin-top: 80px; padding-top: 24px; border-top: 1px solid var(--border); color: var(--text-faint); font-size: 12px; display: flex; justify-content: space-between; align-items: baseline; gap: 20px; flex-wrap: wrap; }
  footer em { font-family: 'Newsreader', serif; font-style: italic; color: var(--text-dim); }

  /* ---------------- Novidades deste refresh ---------------- */
  .fresh-strip { background: linear-gradient(180deg, rgba(212,162,76,0.08), rgba(212,162,76,0.02)); border: 1px solid var(--accent-dim); border-radius: 4px; padding: 18px 22px; margin: 0 0 32px; }
  .fresh-strip .fresh-head { display: flex; align-items: baseline; justify-content: space-between; gap: 16px; margin-bottom: 12px; flex-wrap: wrap; }
  .fresh-strip h3 { font-family: 'Newsreader', serif; font-style: italic; font-weight: 500; font-size: 18px; color: var(--accent); letter-spacing: -0.01em; }
  .fresh-strip .ack { font-size: 12px; color: var(--text-dim); padding: 5px 12px; border: 1px solid var(--border); border-radius: 3px; transition: all .15s; }
  .fresh-strip .ack:hover { color: var(--text); border-color: var(--text-dim); }
  .fresh-list { display: flex; flex-direction: column; gap: 2px; }
  .fresh-item { display: grid; grid-template-columns: 40px 1fr auto; gap: 14px; align-items: baseline; padding: 8px 4px; border-bottom: 1px dashed var(--border-soft); }
  .fresh-item:last-child { border-bottom: 0; }
  .fresh-item .score { font-size: 22px; }
  .fresh-item .ftitle { font-family: 'Newsreader', serif; font-size: 16px; color: var(--text); cursor: pointer; }
  .fresh-item .ftitle:hover { color: var(--accent); }
  .fresh-item .fmeta { font-size: 11px; color: var(--text-faint); letter-spacing: 0.04em; text-transform: uppercase; }
  .new-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--accent); margin-right: 8px; vertical-align: 2px; box-shadow: 0 0 8px rgba(212,162,76,0.5); }

  /* ---------------- Toolbar de filtros ---------------- */
  .toolbar { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; margin: 0 0 28px; padding: 14px 16px; background: var(--bg-card); border: 1px solid var(--border-soft); border-radius: 4px; }
  .toolbar .tb-group { display: flex; align-items: center; gap: 6px; }
  .toolbar .tb-label { font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-faint); margin-right: 4px; }
  .toolbar input[type="search"], .toolbar select { background: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: 3px; padding: 6px 10px; font: inherit; font-size: 13px; }
  .toolbar input[type="search"] { min-width: 200px; }
  .toolbar input[type="search"]:focus, .toolbar select:focus { border-color: var(--accent-dim); outline: none; }
  .toolbar .pill { padding: 4px 10px; font-size: 12px; color: var(--text-dim); border: 1px solid var(--border); border-radius: 999px; cursor: pointer; transition: all .15s; }
  .toolbar .pill:hover { color: var(--text); border-color: var(--text-dim); }
  .toolbar .pill.active { color: var(--accent); border-color: var(--accent-dim); background: rgba(212,162,76,0.1); }
  .toolbar .tb-clear { color: var(--text-faint); font-size: 12px; padding: 4px 8px; }
  .toolbar .tb-clear:hover { color: var(--text-dim); }
  .toolbar .tb-spacer { flex: 1; }
  .filter-summary { margin: 0 0 18px; font-size: 13px; color: var(--text-dim); font-feature-settings: 'tnum'; }
  .filter-summary strong { color: var(--text); font-weight: 500; }

  /* ---------------- Seções colapsáveis ---------------- */
  .section-head.collapsible { cursor: pointer; user-select: none; }
  .section-head.collapsible:hover h2 { color: var(--accent); }
  .section-head .chev-sec { display: inline-block; transition: transform .2s; color: var(--text-faint); margin-right: 8px; font-size: 14px; }
  .section-head.collapsed .chev-sec { transform: rotate(-90deg); }
  .section-body { animation: fade .2s ease; }
  .section-body.hidden { display: none; }
  .section-head .count-badge { font-size: 11px; color: var(--text-dim); background: var(--bg-elev); padding: 2px 8px; border-radius: 999px; margin-left: 8px; font-feature-settings: 'tnum'; }

  /* ---------------- Card: badge "novo" + botão dispensar ---------------- */
  .card .new-flag { display: inline-block; font-size: 10px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); border: 1px solid var(--accent-dim); border-radius: 2px; padding: 1px 6px; margin-right: 10px; vertical-align: 2px; background: rgba(212,162,76,0.08); }
  .act.dismiss { color: var(--text-faint); border-color: var(--border); }
  .act.dismiss:hover { color: var(--danger); border-color: var(--danger); }
  .act.dismiss::before { content: '✕ '; }

  .dismissed-bar { margin-top: 24px; padding: 10px 16px; background: var(--bg-card); border: 1px dashed var(--border); border-radius: 4px; display: flex; justify-content: space-between; align-items: center; font-size: 12px; color: var(--text-dim); }
  .dismissed-bar button { color: var(--accent); border: 1px solid var(--accent-dim); padding: 4px 10px; border-radius: 3px; font-size: 12px; }
  .dismissed-bar button:hover { background: var(--accent); color: var(--bg); }

  /* ---------------- Indicador de atualidade ---------------- */
  .freshness { display: flex; align-items: center; gap: 12px; padding: 12px 16px; margin: 0 0 24px; border-radius: 4px; font-size: 13px; background: var(--bg-card); border: 1px solid var(--border-soft); color: var(--text-dim); flex-wrap: wrap; }
  .freshness .age-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--high); box-shadow: 0 0 8px rgba(143,177,116,0.4); flex-shrink: 0; }
  .freshness.stale { border-color: var(--accent-dim); background: rgba(212,162,76,0.06); color: var(--text); }
  .freshness.stale .age-dot { background: var(--accent); box-shadow: 0 0 10px rgba(212,162,76,0.5); }
  .freshness.very-stale { border-color: var(--danger); background: rgba(183,100,84,0.06); }
  .freshness.very-stale .age-dot { background: var(--danger); box-shadow: 0 0 10px rgba(183,100,84,0.5); }
  .freshness strong { color: var(--text); font-weight: 500; }

/* ---------------- DOM helpers ---------------- */
function el(tag, attrs, ...children) {
  const node = document.createElement(tag);
  if (attrs) {
    for (const k of Object.keys(attrs)) {
      const v = attrs[k];
      if (v == null || v === false) continue;
      if (k === 'class') node.className = v;
      else if (k === 'text') node.textContent = v;
      else if (k === 'style') node.setAttribute('style', v);
      else if (k.startsWith('on') && typeof v === 'function') node[k] = v;
      else node.setAttribute(k, v);
    }
  }
  for (const c of children.flat()) {
    if (c == null || c === false) continue;
    if (typeof c === 'string' || typeof c === 'number') node.appendChild(document.createTextNode(String(c)));
    else node.appendChild(c);
  }
  return node;
}
function clear(node) { while (node.firstChild) node.removeChild(node.firstChild); }

function metaRow(parts) {
  const row = el('div', { class: 'card-meta' });

  kept.forEach((p, i) => {
    if (i > 0) row.appendChild(el('span', { class: 'sep', text: '·' }));
    row.appendChild(p);
  });
  return row;
}

function mdInline(text) {
  const out = [];
  const src = String(text || '');
  const matches = Array.from(src.matchAll(/\*\*(.+?)\*\*/g));
  let last = 0;
  for (const m of matches) {
    if (m.index > last) pushLines(out, src.slice(last, m.index));
    out.push(el('strong', { text: m[1] }));
    last = m.index + m[0].length;
  }
  if (last < src.length) pushLines(out, src.slice(last));
  return out;
}
function pushLines(arr, str) {
  const lines = str.split('\n');
  lines.forEach((l, i) => {
    if (l) arr.push(document.createTextNode(l));
    if (i < lines.length - 1) arr.push(el('br'));
  });
}

function clone(o) { return JSON.parse(JSON.stringify(o)); }

/* ---------------- localStorage (estado leve do client) ---------------- */
const LS_KEYS = { lastSeen: 'tino:lastSeenAt', dismissed: 'tino:dismissed', filters: 'tino:filters', collapsed: 'tino:collapsed' };
function lsRead(key, fallback) {
  try { const v = localStorage.getItem(key); return v == null ? fallback : JSON.parse(v); }
  catch { return fallback; }
}
function lsWrite(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch {}
}
function loadClientState() {
  state.lastSeenAt = Number(lsRead(LS_KEYS.lastSeen, 0)) || 0;
  state.dismissed = new Set(lsRead(LS_KEYS.dismissed, []));
  const f = lsRead(LS_KEYS.filters, null);
  if (f && typeof f === 'object') state.filters = Object.assign(state.filters, f);
  const c = lsRead(LS_KEYS.collapsed, null);
  if (c && typeof c === 'object') state.collapsed = Object.assign(state.collapsed, c);
}
function persistDismissed() { lsWrite(LS_KEYS.dismissed, Array.from(state.dismissed)); }
function persistFilters() { lsWrite(LS_KEYS.filters, state.filters); }
function persistCollapsed() { lsWrite(LS_KEYS.collapsed, state.collapsed); }
function persistLastSeen() { lsWrite(LS_KEYS.lastSeen, state.lastSeenAt); }

function ingestedAt(n) { return Number(n._lastModified || 0) || (n.data ? Date.parse(n.data) || 0 : 0); }
function maxIngestedAt(news) { return news.reduce((acc, n) => Math.max(acc, ingestedAt(n)), 0); }
function isFresh(n) { return state.lastSeenAt > 0 && ingestedAt(n) > state.lastSeenAt; }

/* ---------------- Date formatting (pt-BR) ---------------- */
const DATE_FMT_BR = new Intl.DateTimeFormat('pt-BR', { day: 'numeric', month: 'long', year: 'numeric' });
const DATE_FMT_BR_SHORT = new Intl.DateTimeFormat('pt-BR', { day: 'numeric', month: 'long' });
function parseToDate(iso) {
  if (!iso) return null;
  const t = Date.parse(iso);
  return isFinite(t) ? new Date(t) : null;
}
function formatDateBR(iso, { withYear = true } = {}) {
  const d = parseToDate(iso);
  if (!d) return String(iso || '');
  return (withYear ? DATE_FMT_BR : DATE_FMT_BR_SHORT).format(d);
}
function relativeFromNow(iso, now = Date.now()) {
  const d = parseToDate(iso);
  if (!d) return '';
  const startOf = ts => { const x = new Date(ts); x.setHours(0,0,0,0); return x.getTime(); };
  const diffDays = Math.round((startOf(now) - startOf(d.getTime())) / 86400000);
  if (diffDays === 0) return 'hoje';
  if (diffDays === 1) return 'ontem';
  if (diffDays < 0) return diffDays === -1 ? 'amanhã' : `em ${-diffDays} dias`;
  if (diffDays < 30) return `há ${diffDays} dias`;
  if (diffDays < 60) return 'há 1 mês';
  if (diffDays < 365) return `há ${Math.round(diffDays / 30)} meses`;
  return `há ${Math.round(diffDays / 365)} ${Math.round(diffDays / 365) === 1 ? 'ano' : 'anos'}`;
}
function lastRefreshAt(news) {
  // Prefere _lastModified (vault real). Fallback: max(data) do dataset.
  let maxLm = 0, maxData = 0;
  for (const n of news) {
    if (n._lastModified) maxLm = Math.max(maxLm, Number(n._lastModified));
    if (n.data) { const t = Date.parse(n.data); if (isFinite(t)) maxData = Math.max(maxData, t); }
  }
  return maxLm || maxData || 0;
}

/* ---------------- IndexedDB (persistência do handle do vault) ---------------- */
function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open('tino', 1);
    req.onupgradeneeded = () => req.result.createObjectStore('kv');
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}
async function idbPut(key, val) {
  const db = await openDB();
  return new Promise((res, rej) => {
    const tx = db.transaction('kv', 'readwrite').objectStore('kv').put(val, key);
    tx.onsuccess = () => res(); tx.onerror = () => rej(tx.error);
  });
}
async function idbRead(key) {
  const db = await openDB();
  return new Promise((res, rej) => {
    const r = db.transaction('kv', 'readonly').objectStore('kv').get(key);
    r.onsuccess = () => res(r.result); r.onerror = () => rej(r.error);
  });
}
async function idbRemove(key) {
  const db = await openDB();
  return new Promise((res, rej) => {
    const tx = db.transaction('kv', 'readwrite').objectStore('kv').delete(key);
    tx.onsuccess = () => res(); tx.onerror = () => rej(tx.error);
  });
}

/* ---------------- Markdown parser / serializer ---------------- */
function parseFrontmatter(text) {
  const m = String(text || '').match(/^---\r?\n([\s\S]*?)\r?\n---\r?\n?([\s\S]*)$/);
  if (!m) return { meta: {}, body: text || '' };
  const meta = {};
  m[1].split(/\r?\n/).forEach(line => {
    const idx = line.indexOf(':');
    if (idx === -1) return;
    const k = line.slice(0, idx).trim();
    let v = line.slice(idx + 1).trim();
    if (!k) return;
    if (v.startsWith('[') && v.endsWith(']')) {
      v = v.slice(1, -1).split(',').map(s => s.trim().replace(/^["']|["']$/g, '')).filter(Boolean);
    } else if (v === 'true') v = true;
    else if (v === 'false') v = false;
    else if (v !== '' && !isNaN(Number(v))) v = Number(v);
    else v = v.replace(/^["']|["']$/g, '');
    meta[k] = v;
  });
  return { meta, body: (m[2] || '').trim() };
}
function serializeFrontmatter(meta, body) {
  const lines = Object.entries(meta).map(([k, v]) => {
    if (Array.isArray(v)) return `${k}: [${v.map(x => typeof x === 'string' && /[,:\[\]]/.test(x) ? `"${x}"` : x).join(', ')}]`;
    return `${k}: ${v}`;
  });
  return `---\n${lines.join('\n')}\n---\n\n${body || ''}`;
}

async function pickVault() {
  if (!window.showDirectoryPicker) { alert('Seu navegador não suporta File System Access API.\n\nUse Chrome, Edge, Arc ou Brave.'); return; }
  try {
    const handle = await window.showDirectoryPicker({ mode: 'readwrite' });
    await connectVaultHandle(handle);
  } catch (e) { if (e.name !== 'AbortError') console.error(e); }
}

async function connectVaultHandle(handle) {
  state.vaultHandle = handle;
  state.vaultName = handle.name;

  let tinoHandle;
  try { tinoHandle = await handle.getDirectoryHandle('Tino'); }
  catch {
    try { tinoHandle = await handle.getDirectoryHandle('tino'); }
    catch {
      const create = confirm(`Não encontrei a pasta "Tino/" no vault "${handle.name}".\n\nCriar agora com estrutura inicial?`);
      if (!create) return;
      tinoHandle = await handle.getDirectoryHandle('Tino', { create: true });
      await seedVault(tinoHandle);
    }
  }
  state.tinoHandle = tinoHandle;
  state.mode = 'connected';

  try { await idbPut('vaultHandle', handle); } catch (e) { console.warn('não foi possível salvar handle', e); }

  // Conta .md do vault inteiro em paralelo (evidência visual de que lemos o vault inteiro)
  scanVaultStats(handle).then(stats => { state.vaultStats = stats; render(); }).catch(() => {});

  await loadFromVault();
  hideBanner();
  render();
}

/* Conta .md recursivo do vault inteiro — só pra estatística, sem ler conteúdo.
   Respeita limite pra não travar navegador em vault enorme. */
async function scanVaultStats(handle, { maxDepth = 8, maxFiles = 5000 } = {}) {
  const stats = { mdFiles: 0, dirs: 0, aborted: false, sample: [] };
  async function walk(dir, depth, prefix) {
    if (stats.aborted || depth > maxDepth) return;
    for await (const [name, h] of dir.entries()) {
      if (stats.mdFiles >= maxFiles) { stats.aborted = true; return; }
      if (h.kind === 'directory') {
        if (name.startsWith('.') || name === 'Tino' || name === 'tino' || name === 'node_modules') continue;
        stats.dirs += 1;
        await walk(h, depth + 1, prefix + name + '/');
      } else if (name.endsWith('.md')) {
        stats.mdFiles += 1;
        if (stats.sample.length < 5) stats.sample.push(prefix + name);
      }
    }
  }
  try { await walk(handle, 0, ''); } catch {}
  return stats;
}

async function seedVault(tinoDir) {
  const novDir = await tinoDir.getDirectoryHandle('novidades', { create: true });

  const today = new Date().toISOString().slice(0, 10);

  );
  await writeFileContent(tinoDir, '_perfil.md', prof);
  const conf = serializeFrontmatter({ fontes_ativas: 0, fontes_inativas: 0, frequencia: '1x por dia', vault_subpasta: 'Tino' }, '');
  await writeFileContent(tinoDir, '_config.md', conf);
  const sample = serializeFrontmatter(
    { id: 'exemplo-novidade', titulo: 'Exemplo de novidade', fonte: 'Tino', data: today, tipo: 'exemplo', nota: 7.0, veredito: 'Considera', resumo: 'Esta é uma novidade de exemplo gerada pelo setup inicial.', cite: '', url: '', favorito: false },

  );

}

  const fh = await dir.getFileHandle(name, { create: true });

    firstFewTitles: [],
  };

  try { data.profile = hydrateProfile(await readFile(tino, '_perfil.md')); diag.perfilFound = true; } catch (e) { diag.perfilError = String(e?.message || e); }
  try { data.config = await readFile(tino, '_config.md'); diag.configFound = true; } catch {}

  try {
    const novDir = await tino.getDirectoryHandle('novidades');
    diag.novidadesFound = true;
    data.news = [];
    for await (const [name, h] of novDir.entries()) {
      if (h.kind !== 'file' || !name.endsWith('.md')) continue;
      diag.mdFiles += 1;
      try {
        const file = await h.getFile();
        const text = await file.text();
        const parsed = parseFrontmatter(text);
        data.news.push({
          id: String(parsed.meta.id || name.replace(/\.md$/, '')),
          titulo: String(parsed.meta.titulo || '(sem título)'),
          fonte: String(parsed.meta.fonte || ''),
          data: String(parsed.meta.data || ''),
          tipo: String(parsed.meta.tipo || ''),
          nota: Number(parsed.meta.nota) || 0,
          veredito: String(parsed.meta.veredito || ''),
          resumo: String(parsed.meta.resumo || ''),
          cite: String(parsed.meta.cite || ''),
          url: String(parsed.meta.url || ''),
          favorito: parsed.meta.favorito === true,
          body: parsed.body,
          tldr: String(parsed.meta.tldr || ''),
          next_step: String(parsed.meta.next_step || ''),
          tradeoff: String(parsed.meta.tradeoff || ''),
          confidence: Number.isFinite(Number(parsed.meta.confidence)) ? Number(parsed.meta.confidence) : null,
          read_min: Number.isFinite(Number(parsed.meta.read_min)) ? Number(parsed.meta.read_min) : null,
          anchors: Array.isArray(parsed.meta.anchors) ? parsed.meta.anchors.map(String).filter(Boolean) : [],
          _filename: name,
          _lastModified: file.lastModified || 0
        });
        diag.parsed += 1;
      } catch (e) {
        diag.parseErrors.push({ file: name, error: String(e?.message || e) });
      }
    }
    data.news.sort((a, b) => (b.nota - a.nota) || String(b.data).localeCompare(String(a.data)));
    diag.firstFewTitles = data.news.slice(0, 5).map(n => `${n.nota} · ${n.titulo}`);
  } catch (e) {
    diag.novidadesError = String(e?.message || e);
  }

  state.data = data;
  state.diag = diag;
  if (typeof console !== 'undefined' && console.info) console.info('[Tino] loadFromVault diagnostics', diag);
}

function hydrateProfile(parsed) {
  const m = parsed.meta || {};
  const sections = { identidade: '', foco: '', evita_body: '' };
  const parts = String(parsed.body || '').split(/^##\s+/m);
  parts.forEach(p => {
    const [head, ...rest] = p.split(/\r?\n/);
    const content = rest.join('\n').trim();
    const h = String(head || '').trim().toLowerCase();
    if (h.startsWith('identidade')) sections.identidade = content;
    else if (h.startsWith('foco')) sections.foco = content;
    else if (h.startsWith('evita')) sections.evita_body = content;
  });
  return {
    meta: {
      nome: String(m.nome || ''),
      atualizado: String(m.atualizado || ''),
      foco_ativo: Array.isArray(m.foco_ativo) ? m.foco_ativo : [],
      identidade: Array.isArray(m.identidade) ? m.identidade : [],
      evita: Array.isArray(m.evita) ? m.evita : [],
      processadas: Number(m.processadas) || 0,
      favoritadas: Number(m.favoritadas) || 0,
      thumb_up: Number(m.thumb_up) || 0,
      thumb_down: Number(m.thumb_down) || 0,
      acerto: Number(m.acerto) || 0
    },
    identidade: sections.identidade || MOCK_PROFILE.identidade,
    foco: sections.foco || MOCK_PROFILE.foco,
    evita_body: sections.evita_body || MOCK_PROFILE.evita_body
  };
}

async function readFile(dir, name) {
  const fh = await dir.getFileHandle(name);
  const file = await fh.getFile();
  return parseFrontmatter(await file.text());
}

async function toggleFavorite(newsId) {
  const item = state.data.news.find(n => n.id === newsId);
  if (!item) return;
  item.favorito = !item.favorito;
  if (state.mode === 'connected' && item._filename) {
    try {
      const novDir = await state.tinoHandle.getDirectoryHandle('novidades');
      const fh = await novDir.getFileHandle(item._filename);
      const text = await (await fh.getFile()).text();
      const parsed = parseFrontmatter(text);
      parsed.meta.favorito = item.favorito;
      const out = serializeFrontmatter(parsed.meta, parsed.body);
      const w = await fh.createWritable();
      await w.write(out); await w.close();
    } catch (err) { console.error('falha ao escrever no vault', err); }
  }
  render();
}

/* ---------------- Ajustes (thumbs up/down) ---------------- */
const ADJ_FILE = '_ajustes.md';
const SEC_CERTEIROS = 'Certeiros';
const SEC_ERRADOS = 'Errados';
const ADJ_SEP = ' — ';

function todayStampLocal() {
  const d = new Date();
  const y = d.getUTCFullYear();
  const m = String(d.getUTCMonth() + 1).padStart(2, '0');
  const day = String(d.getUTCDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

// Parseia body em secoes { name, lines[] } preservando ordem.
function parseAdjSections(body) {
  const sections = [{ name: '', lines: [] }];
  const lines = String(body || '').split(/\r?\n/);
  for (const line of lines) {
    const h = line.match(/^##\s+(.+?)\s*$/);
    if (h) sections.push({ name: h[1].trim(), lines: [] });
    else sections[sections.length - 1].lines.push(line);
  }
  return sections;
}

function serializeAdjSections(sections) {
  const out = [];
  for (const s of sections) {
    if (s.name) out.push(`## ${s.name}`);
    let lines = s.lines.slice();
    while (lines.length && lines[lines.length - 1] === '') lines.pop();
    out.push(...lines);
    out.push('');
  }
  while (out.length && out[out.length - 1] === '') out.pop();
  return out.join('\n');
}

function findAdjSection(sections, name) {
  return sections.find(s => s.name.toLowerCase() === name.toLowerCase()) || null;
}
function ensureAdjSection(sections, name) {
  let s = findAdjSection(sections, name);
  if (!s) { s = { name, lines: [] }; sections.push(s); }
  return s;
}
function parseAdjItemLine(line) {
  const m = String(line).match(/^\s*[-*]\s+(\S+)\s+(?:—|-|--)\s+(.+?)\s*$/);
  if (!m) return null;
  return { id: m[1], titulo: m[2] };
}
function formatAdjItemLine(id, titulo) {
  return `- ${id}${ADJ_SEP}${titulo || ''}`;
}
function removeItemFromAdjSection(section, id) {
  if (!section) return false;
  const before = section.lines.length;
  section.lines = section.lines.filter(line => {
    const it = parseAdjItemLine(line);
    return !it || it.id !== id;
  });
  return section.lines.length !== before;
}
function upsertItemInAdjSection(section, id, titulo) {
  let replaced = false;
  section.lines = section.lines.map(line => {
    const it = parseAdjItemLine(line);
    if (it && it.id === id) { replaced = true; return formatAdjItemLine(id, titulo); }
    return line;
  });
  if (!replaced) section.lines.push(formatAdjItemLine(id, titulo));
  return !replaced;
}

async function recordAdjustment(newsId, titulo, sinal) {
  // No-op em modo demo.
  if (state.mode !== 'connected' || !state.tinoHandle) return;
  if (sinal !== 'certeiro' && sinal !== 'errado') return;

  let fh;
  let currentText = '';
  try {
    fh = await state.tinoHandle.getFileHandle(ADJ_FILE, { create: true });
    try {
      const file = await fh.getFile();
      currentText = await file.text();
    } catch { currentText = ''; }
  } catch (err) {
    console.error('falha ao abrir _ajustes.md', err);
    return;
  }

  const parsed = parseFrontmatter(currentText);
  const meta = parsed.meta || {};
  const body = parsed.body || '';
  const sections = parseAdjSections(body);
  const certeiros = ensureAdjSection(sections, SEC_CERTEIROS);
  const errados = ensureAdjSection(sections, SEC_ERRADOS);

  const sourceSec = sinal === 'certeiro' ? errados : certeiros;
  const targetSec = sinal === 'certeiro' ? certeiros : errados;
  const targetKey = sinal === 'certeiro' ? 'thumb_up' : 'thumb_down';
  const oppositeKey = sinal === 'certeiro' ? 'thumb_down' : 'thumb_up';

  const alreadyInTarget = targetSec.lines.some(line => {
    const it = parseAdjItemLine(line);
    return it && it.id === newsId;
  });
  const existedInSource = removeItemFromAdjSection(sourceSec, newsId);

  upsertItemInAdjSection(targetSec, newsId, titulo || '');

  const prevUp = Number.isFinite(Number(meta.thumb_up)) ? Number(meta.thumb_up) : 0;
  const prevDown = Number.isFinite(Number(meta.thumb_down)) ? Number(meta.thumb_down) : 0;
  const counters = { thumb_up: prevUp, thumb_down: prevDown };
  if (!alreadyInTarget) {
    counters[targetKey] += 1;
    if (existedInSource) counters[oppositeKey] = Math.max(0, counters[oppositeKey] - 1);
  }

  if (!findAdjSection(sections, 'Tags a ignorar')) {
    sections.push({ name: 'Tags a ignorar', lines: ['(edite `ignore_tags` no frontmatter — tags aqui sao penalizadas pelo ranker)'] });
  }

  const nextMeta = {
    atualizado: todayStampLocal(),
    thumb_up: counters.thumb_up,
    thumb_down: counters.thumb_down,
    ignore_tags: Array.isArray(meta.ignore_tags) ? meta.ignore_tags : []
  };
  const nextBody = serializeAdjSections(sections);
  const text = serializeFrontmatter(nextMeta, nextBody) + '\n';

  try {
    const w = await fh.createWritable();
    await w.write(text);
    await w.close();
  } catch (err) {
    console.error('falha ao escrever _ajustes.md', err);
  }
}

async function disconnectVault() {
  if (!confirm('Desconectar o vault? Você volta para o modo demo com dados de exemplo.')) return;
  try { await idbRemove('vaultHandle'); } catch {}
  state.vaultHandle = null; state.tinoHandle = null; state.mode = 'demo'; state.vaultName = null;
  state.data = { news: clone(MOCK_NEWS), profile: clone(MOCK_PROFILE), config: clone(MOCK_CONFIG) };
  render();
}

async function tryRestore() {
  try {
    const handle = await idbRead('vaultHandle');
    if (!handle) return;
    const perm = await handle.queryPermission({ mode: 'readwrite' });
    if (perm === 'granted') {
      state.vaultHandle = handle; state.vaultName = handle.name;
      try { state.tinoHandle = await handle.getDirectoryHandle('Tino'); }
      catch {
        try { state.tinoHandle = await handle.getDirectoryHandle('tino'); }
        catch { showBanner('warn', `Pasta Tino/ não encontrada em "${handle.name}".`, 'Selecionar outro vault', pickVault); return; }
      }
      state.mode = 'connected';
      await loadFromVault();
      render();
    } else if (perm === 'prompt') {
      showBanner('warn', `Vault "${handle.name}" salvo. Reautorize o acesso para retomar.`, 'Reconectar', async () => {
        const p = await handle.requestPermission({ mode: 'readwrite' });
        if (p === 'granted') { await connectVaultHandle(handle); }
      });
    }
  } catch (err) { console.warn('restore falhou', err); }
}

function tagClass(v) { const x = String(v || '').toLowerCase(); if (x.startsWith('foca')) return 'focar'; if (x.startsWith('consid')) return 'considera'; if (x.startsWith('acomp')) return 'acompanha'; return 'ignore'; }

function sectionHead(titlePlainBefore, emphasized, titlePlainAfter, hint) {
  const h = el('h2');
  if (titlePlainBefore) h.append(document.createTextNode(titlePlainBefore));
  if (emphasized) h.append(el('em', { text: emphasized }));
  if (titlePlainAfter) h.append(document.createTextNode(titlePlainAfter));
  return el('div', { class: 'section-head' }, h, hint ? el('span', { class: 'hint', text: hint }) : null);
}

function parseAnchor(s) {
  const m = String(s || '').split('|');
  return { path: (m[0] || '').trim(), snippet: (m[1] || '').trim() };
}

function renderWhyLegacy(n) {
  return el('div', { class: 'reason' },
    el('div', { class: 'label', text: 'Por que importa para você' }),
    n.body ? el('p', { text: n.body }) : null,
    n.cite ? el('span', { class: 'cite' }, 'Obsidian · ', el('em', { text: n.cite })) : null
  );
}

function renderWhyRich(n) {
  const why = el('div', { class: 'why' });

  if (n.tldr) {
    why.appendChild(el('div', { class: 'why-block why-tldr' },
      el('div', { class: 'why-label' }, el('span', { class: 'ic', text: '✱' }), 'Pra você, agora'),
      el('p', { text: n.tldr })
    ));
  }

  if (n.body) {
    why.appendChild(el('div', { class: 'why-block why-narrative' },
      el('div', { class: 'why-label' }, 'Conexão com seu contexto'),
      el('p', { text: n.body })
    ));
  }

  if (n.anchors && n.anchors.length) {
    const ul = el('ul');
    n.anchors.forEach(raw => {
      const a = parseAnchor(raw);
      const li = el('li', null, el('code', { text: a.path }));
      if (a.snippet) li.appendChild(el('span', { class: 'snip', text: '— ' + a.snippet }));
      ul.appendChild(li);
    });
    why.appendChild(el('div', { class: 'why-block why-anchors' },
      el('div', { class: 'why-label' }, el('span', { class: 'ic', text: '📎' }), 'Ancora em'),
      ul
    ));
  }

  if (n.next_step || n.tradeoff) {
    const grid = el('div', { class: 'why-action' });
    if (n.next_step) grid.appendChild(el('div', null,
      el('div', { class: 'why-label' }, el('span', { class: 'ic', text: '→' }), 'Próximo passo'),
      el('p', { class: 'a-next', text: n.next_step })
    ));
    if (n.tradeoff) grid.appendChild(el('div', null,
      el('div', { class: 'why-label' }, el('span', { class: 'ic', text: '⚖' }), 'Trade-off'),
      el('p', { class: 'a-trade', text: n.tradeoff })
    ));
    why.appendChild(el('div', { class: 'why-block' }, grid));
  }

  // Meta (confiança + tempo de leitura + cite legado)
  const metaParts = [];
  if (Number.isFinite(n.confidence)) {
    const bar = el('span', { class: 'conf-bar' });
    const lvl = Math.max(0, Math.min(5, Math.round(n.confidence)));
    for (let i = 0; i < 5; i++) bar.appendChild(el('i', { class: i < lvl ? 'on' : '' }));
    metaParts.push(el('span', { class: 'meta-item' }, el('strong', { text: 'Confiança' }), bar));
  }
  if (Number.isFinite(n.read_min) && n.read_min > 0) {
    metaParts.push(el('span', { class: 'meta-item' }, el('strong', { text: `${n.read_min} min de leitura` })));
  }
  if (n.cite) metaParts.push(el('span', { class: 'meta-item' }, el('strong', { text: 'cite:' }), el('em', { text: n.cite })));
  if (metaParts.length) {
    const meta = el('div', { class: 'why-meta' });
    metaParts.forEach(p => meta.appendChild(p));
    why.appendChild(meta);
  }

  return why;
}

function card(n) {
  const scoreDiv = el('div', { class: 'score-col' },
    el('span', { class: `score ${scoreClass(n.nota)}`, text: Number(n.nota).toFixed(1) }),
    el('span', { class: 'score-label', text: 'nota' })
  );

  const fresh = isFresh(n);
  const titleNode = el('h3');
  if (fresh) titleNode.appendChild(el('span', { class: 'new-flag', text: 'novo' }));
  titleNode.appendChild(document.createTextNode(n.titulo));

  const body = el('div', { class: 'card-body' },
    titleNode,
    n.fonte ? metaRow([
      el('span', { class: 'source', text: n.fonte }),
      n.tipo ? el('span', { text: n.tipo }) : null,
      n.data ? el('span', { text: formatDateBR(n.data) }) : null,
      n.data ? el('span', { style: 'color:var(--text-faint)', text: relativeFromNow(n.data) }) : null
    ]) : null,
    el('p', { class: 'verdict' },
      el('span', { class: `tag ${tagClass(n.veredito)}`, text: n.veredito }),
      n.resumo
    )
  );

  const hasRichWhy = !!(n.tldr || n.next_step || n.tradeoff || (n.anchors && n.anchors.length) || Number.isFinite(n.confidence) || Number.isFinite(n.read_min));
  const expandable = Boolean(hasRichWhy || n.body || n.cite);

  if (expandable) {
    const reason = hasRichWhy ? renderWhyRich(n) : (n.body || n.cite ? renderWhyLegacy(n) : null);

    const actions = el('div', { class: 'expand-actions' },
      el('button', { class: 'act primary' + (n.favorito ? ' active' : ''), 'data-fav': n.id, text: n.favorito ? 'Favoritado' : 'Favoritar' }),
      el('button', { class: 'act thumb up', 'data-thumb': 'up', 'data-id': n.id, 'data-titulo': n.titulo, text: 'Certeiro' }),
      el('button', { class: 'act thumb down', 'data-thumb': 'down', 'data-id': n.id, 'data-titulo': n.titulo, text: 'Errou' }),
      el('button', { class: 'act dismiss', 'data-dismiss': n.id, text: 'Dispensar' }),
      isSafeUrl(n.url) ? el('a', { class: 'act', href: n.url, target: '_blank', rel: 'noopener', text: 'Abrir fonte' }) : null
    );

    body.appendChild(el('div', { class: 'expand' }, reason, actions));
  }

  const actionHint = expandable
    ? el('div', { class: 'card-action' }, 'expandir ', el('span', { class: 'chev', text: '▾' }))
    : el('div');

  return el('article', { class: 'card', 'data-id': n.id }, scoreDiv, body, actionHint);
}

function cardsList(items, extraClass) {
  const c = el('div', { class: 'cards' + (extraClass ? ' ' + extraClass : '') });
  items.forEach(n => c.appendChild(card(n)));
  return c;
}

          el('summary', { style: 'color:var(--text-dim);cursor:pointer', text: 'Diagnóstico técnico' }),
        );
        const techPre = el('pre', { style: 'margin-top:8px;padding:12px;background:var(--bg);border:1px solid var(--border);border-radius:3px;font-size:11px;color:var(--text-dim)' });
        techPre.textContent = JSON.stringify({
          perfilFound: d.perfilFound,
          configFound: d.configFound,
          novidadesFound: d.novidadesFound,
          mdFilesEmNovidades: d.mdFiles,
          parsed: d.parsed,
          parseErrors: d.parseErrors,
        }, null, 2);
        techDetails.append(techPre);
        children.push(techDetails);
      }

      children.push(el('p', { style: 'margin-top:32px' },
        el('button', { class: 'cta', onclick: disconnectVault, text: 'Voltar ao modo demo' })
      ));
    } else {
      children.push(el('h2', { text: 'Nenhuma novidade ainda' }));
      children.push(el('p', { text: 'Rode o comando de refresh do seu Claude Code para que o Tino processe as fontes e popule esta visualização.' }));
      children.push(el('div', { class: 'cmd', style: 'display:inline-block;font-size:13px;padding:10px 16px', text: '/tino:refresh' }));
    }
    root.appendChild(el('div', { class: 'empty' }, ...children));
    return;
  }

  // [legacy block — substituído por novo pipeline abaixo]
  renderTodayV2(root);
}

function applyFilters(list) {
  const f = state.filters;
  const now = Date.now();
  const windowMs = f.janela === '7d' ? 7 * 86400000 : f.janela === '30d' ? 30 * 86400000 : null;
  const q = String(f.q || '').trim().toLowerCase();
  return list.filter(n => {
    if (f.fonte && n.fonte !== f.fonte) return false;
    if (f.tipo && n.tipo !== f.tipo) return false;
    if (windowMs) {
      const t = n.data ? Date.parse(n.data) : 0;
      if (!t || (now - t) > windowMs) return false;
    }
    if (q) {
      const hay = `${n.titulo} ${n.resumo} ${n.body || ''} ${n.fonte} ${n.tipo}`.toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });
}

function renderToolbar() {
  const tb = el('div', { class: 'toolbar' });
  const fontes = Array.from(new Set(state.data.news.map(n => n.fonte).filter(Boolean))).sort();
  const tipos = Array.from(new Set(state.data.news.map(n => n.tipo).filter(Boolean))).sort();
  const f = state.filters;

  const search = el('input', { type: 'search', placeholder: 'Buscar por título, resumo, fonte…', value: f.q });
  search.addEventListener('input', () => { state.filters.q = search.value; persistFilters(); renderToday(); search.focus(); });

  const fonteSel = el('select');
  fonteSel.appendChild(el('option', { value: '', text: 'Todas as fontes' }));
  fontes.forEach(s => { const o = el('option', { value: s, text: s }); if (s === f.fonte) o.selected = true; fonteSel.appendChild(o); });
  fonteSel.addEventListener('change', () => { state.filters.fonte = fonteSel.value; persistFilters(); renderToday(); });

  const tipoSel = el('select');
  tipoSel.appendChild(el('option', { value: '', text: 'Todos os tipos' }));
  tipos.forEach(s => { const o = el('option', { value: s, text: s }); if (s === f.tipo) o.selected = true; tipoSel.appendChild(o); });
  tipoSel.addEventListener('change', () => { state.filters.tipo = tipoSel.value; persistFilters(); renderToday(); });

  const janelaGroup = el('div', { class: 'tb-group' }, el('span', { class: 'tb-label', text: 'janela' }));
  ['7d', '30d', 'all'].forEach(w => {
    const labels = { '7d': '7 dias', '30d': '30 dias', 'all': 'tudo' };
    const p = el('button', { class: 'pill' + (f.janela === w ? ' active' : ''), text: labels[w] });
    p.addEventListener('click', () => { state.filters.janela = w; persistFilters(); renderToday(); });
    janelaGroup.appendChild(p);
  });

  const hasAny = f.q || f.fonte || f.tipo || f.janela !== 'all';
  const clearBtn = el('button', { class: 'tb-clear', text: 'limpar filtros' });
  clearBtn.addEventListener('click', () => { state.filters = { fonte: '', tipo: '', janela: 'all', q: '' }; persistFilters(); renderToday(); });

  const parts = [
    el('span', { class: 'tb-label', text: 'filtrar' }),
    search,
    fonteSel,
    tipoSel,
    janelaGroup,
    el('span', { class: 'tb-spacer' })
  ];
  if (hasAny) parts.push(clearBtn);
  tb.append(...parts);
  return tb;
}

function renderTodayV2(root) {
  const allNews = state.data.news;
  const totalAll = allNews.length;
  const dismissedCount = allNews.filter(n => state.dismissed.has(n.id)).length;
  const freshCount = allNews.filter(n => isFresh(n) && !state.dismissed.has(n.id)).length;

  // 1) Calm intro — honesto sobre o que é novo
  const calmIntro = el('div', { class: 'calm' });
  const calmP = el('p');
  if (freshCount > 0) {
    calmP.appendChild(document.createTextNode('Desde o último ciclo, '));
    calmP.appendChild(el('strong', { text: `${freshCount} ${freshCount === 1 ? 'novidade nova' : 'novidades novas'}` }));
    calmP.appendChild(document.createTextNode(` ${freshCount === 1 ? 'apareceu' : 'apareceram'} no seu radar.`));
  } else if (state.lastSeenAt === 0) {
    calmP.appendChild(el('strong', { text: `${totalAll} novidades` }));
    calmP.appendChild(document.createTextNode(' acumuladas. Use os filtros abaixo para focar no que importa.'));
  } else {
    calmP.appendChild(document.createTextNode('Você está em dia. '));
    calmP.appendChild(el('strong', { text: 'Nenhuma novidade nova' }));
    calmP.appendChild(document.createTextNode(' desde o último ciclo.'));
  }
  calmP.appendChild(el('span', { class: 'sub', text: `${totalAll} acumuladas no total · ${dismissedCount} dispensadas. Tino lê seu vault Obsidian e ranqueia o que é relevante para seu momento.` }));
  calmIntro.appendChild(calmP);
  root.appendChild(calmIntro);

  // 1.5) Banner de atualidade — quando foi o último refresh?
  const refreshTs = lastRefreshAt(allNews);
  if (refreshTs > 0) {
    const days = Math.floor((Date.now() - refreshTs) / 86400000);
    const rel = relativeFromNow(new Date(refreshTs).toISOString());
    const cls = days >= 14 ? 'very-stale' : days >= 5 ? 'stale' : '';
    const banner = el('div', { class: 'freshness' + (cls ? ' ' + cls : '') });
    banner.appendChild(el('span', { class: 'age-dot' }));
    const main = el('span');
    main.append('Último refresh: ', el('strong', { text: formatDateBR(new Date(refreshTs).toISOString()) }), ` · ${rel}`);
    banner.appendChild(main);
    banner.appendChild(el('span', { class: 'spacer' }));
    if (cls) {
      const nudge = el('span', { class: 'nudge' });
      nudge.append(
        days >= 14 ? 'Seu radar está desatualizado — rode' : 'Pode valer rodar',
        el('code', { text: '/tino:refresh' })
      );
      banner.appendChild(nudge);
    }
    root.appendChild(banner);
  }

  // 2) Strip "Novidades deste refresh" — só destaca o que é novo E relevante (>= 7)
  if (freshCount > 0) {
    const relevantFresh = allNews
      .filter(n => isFresh(n) && !state.dismissed.has(n.id) && n.nota >= 7)
      .sort((a, b) => (b.nota - a.nota) || (ingestedAt(b) - ingestedAt(a)))
      .slice(0, 8);

    const strip = el('div', { class: 'fresh-strip' });
    const headLabel = relevantFresh.length > 0
      ? `Novidades deste refresh · ${freshCount}`
      : `${freshCount} chegaram neste refresh · nenhuma com nota ≥ 7`;
    const head = el('div', { class: 'fresh-head' },
      el('h3', null, el('span', { class: 'new-dot' }), headLabel),
      el('button', { class: 'ack', text: 'Marcar todas como vistas' })
    );
    head.querySelector('.ack').addEventListener('click', () => {
      state.lastSeenAt = maxIngestedAt(allNews);
      persistLastSeen();
      renderToday();
    });
    strip.appendChild(head);

    if (relevantFresh.length > 0) {
      const list = el('div', { class: 'fresh-list' });
      relevantFresh.forEach(n => {
        const item = el('div', { class: 'fresh-item' });
        item.appendChild(el('span', { class: `score ${scoreClass(n.nota)}`, text: Number(n.nota).toFixed(1) }));
        const titleEl = el('div', { class: 'ftitle', text: n.titulo });
        titleEl.addEventListener('click', () => {
          const card = document.querySelector(`.card[data-id="${CSS.escape(n.id)}"]`);
          if (card) { card.classList.add('expanded'); card.scrollIntoView({ behavior: 'smooth', block: 'center' }); }
        });
        item.appendChild(titleEl);
        const metaStr = [n.fonte, n.data ? formatDateBR(n.data, { withYear: false }) : '', n.data ? relativeFromNow(n.data) : '']
          .filter(Boolean).join(' · ');
        item.appendChild(el('span', { class: 'fmeta', text: metaStr }));
        list.appendChild(item);
      });
      strip.appendChild(list);
    }
    root.appendChild(strip);
  }

  // 3) Toolbar de filtros
  root.appendChild(renderToolbar());

  // 4) Pipeline de exibição: descarta dispensadas (a menos que showDismissed), aplica filtros
  const baseList = state.showDismissed
    ? allNews
    : allNews.filter(n => !state.dismissed.has(n.id));
  const filtered = applyFilters(baseList);

  // 5) Resumo do que está sendo mostrado
  const foco = filtered.filter(n => n.nota >= 9);
  const consid = filtered.filter(n => n.nota >= 7 && n.nota < 9);
  const ignore = filtered.filter(n => n.nota < 7);
  const summary = el('div', { class: 'filter-summary' });
  summary.append(
    'Mostrando ', el('strong', { text: String(filtered.length) }),
    ` de ${baseList.length} · `,
    el('strong', { text: String(foco.length) }), ' p/ focar · ',
    el('strong', { text: String(consid.length) }), ' a considerar · ',
    el('strong', { text: String(ignore.length) }), ' p/ ignorar'
  );
  root.appendChild(summary);

  if (filtered.length === 0) {
    root.appendChild(el('div', { class: 'no-results' },
      el('h3', { text: 'Nada bate com esses filtros' }),
      el('p', { text: 'Tente alargar a janela temporal, mudar a fonte ou limpar a busca.' })
    ));
  }

  // 6) Seções — Focar sempre aberta, Considerar/Ignorar colapsáveis
  if (foco.length) {
    root.appendChild(sectionHead('', 'Focar', ' hoje', 'nota 9+ · altamente aplicável'));
    root.appendChild(cardsList(foco));
  }
  if (consid.length) {
    appendCollapsibleSection(root, 'considera', 'Considerar', '', `nota 7–8.9 · ${consid.length} ${consid.length === 1 ? 'item' : 'itens'}`, cardsList(consid));
  }
  if (ignore.length) {
    appendCollapsibleSection(root, 'ignore', 'Ignorar', ' por ora', `nota < 7 · ${ignore.length} ${ignore.length === 1 ? 'item' : 'itens'}`, cardsList(ignore, 'ignored'));
  }

  // 7) Barra de dispensadas (toggle no fim)
  if (dismissedCount > 0) {
    const bar = el('div', { class: 'dismissed-bar' });
    bar.append(
      el('span', { text: `${dismissedCount} ${dismissedCount === 1 ? 'novidade dispensada' : 'novidades dispensadas'}` }),
      el('button', { text: state.showDismissed ? 'Ocultar dispensadas' : 'Mostrar dispensadas' })
    );
    bar.querySelector('button').addEventListener('click', () => {
      state.showDismissed = !state.showDismissed;
      renderToday();
    });
    root.appendChild(bar);
  }
}

function appendCollapsibleSection(root, key, before, after, hint, content) {
  const collapsed = state.collapsed[key] === true;
  const head = sectionHead('', before, after, hint);
  head.classList.add('collapsible');
  if (collapsed) head.classList.add('collapsed');
  // Chevron antes do título
  const h2 = head.querySelector('h2');
  h2.insertBefore(el('span', { class: 'chev-sec', text: '▾' }), h2.firstChild);
  // Wrapper do conteúdo
  const wrap = el('div', { class: 'section-body' + (collapsed ? ' hidden' : '') }, content);
  head.addEventListener('click', () => {
    state.collapsed[key] = !state.collapsed[key];
    persistCollapsed();
    head.classList.toggle('collapsed');
    wrap.classList.toggle('hidden');
  });
  root.appendChild(head);
  root.appendChild(wrap);
}

function wireCards() {
  document.querySelectorAll('.card').forEach(c => {
    c.addEventListener('click', (e) => {
      if (e.target.closest('.act') || e.target.closest('a')) return;
      c.classList.toggle('expanded');
    });
  });
  document.querySelectorAll('[data-fav]').forEach(btn => {
    btn.addEventListener('click', (e) => { e.stopPropagation(); toggleFavorite(btn.getAttribute('data-fav')); });
  });
  document.querySelectorAll('[data-dismiss]').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const id = btn.getAttribute('data-dismiss');
      if (state.dismissed.has(id)) state.dismissed.delete(id);
      else state.dismissed.add(id);
      persistDismissed();
      renderToday();
      updateCounts();
    });
  });
  document.querySelectorAll('[data-thumb]').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const wasActive = btn.classList.contains('active');
      btn.parentElement.querySelectorAll('[data-thumb]').forEach(s => s.classList.remove('active'));
      if (!wasActive) btn.classList.add('active');
      if (state.mode === 'connected' && !wasActive) {
        const id = btn.getAttribute('data-id');
        const titulo = btn.getAttribute('data-titulo') || '';
        const sinal = btn.getAttribute('data-thumb') === 'up' ? 'certeiro' : 'errado';
        recordAdjustment(id, titulo, sinal).catch(err => console.error('recordAdjustment falhou', err));
      }
    });
  });
}

function render() {
  renderStatus();
  renderToday();
  renderFavorites();
  renderProfile();
  renderSettings();
  wireCards();
  updateCounts();
}

/* TABS */
document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => {
  document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  t.classList.add('active');
  document.getElementById(t.getAttribute('data-view')).classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}));

/* Tenta carregar dashboard-data.json (dumpado por scripts/generate-dashboard-data.mjs).
   Usado quando o dashboard é servido via HTTP local e há um snapshot do vault sample.
   Se ausente ou inválido, cai no MOCK embutido. */
async function tryLoadDemoData() {
  try {
    if (typeof location !== 'undefined' && new URLSearchParams(location.search).has('mock')) return false;
    const res = await fetch('./dashboard-data.json', { cache: 'no-store' });
    if (!res.ok) return false;
    const payload = await res.json();
    if (!payload || !Array.isArray(payload.news) || payload.news.length === 0) return false;
    state.data = {
      news: payload.news,
      profile: payload.profile || clone(MOCK_PROFILE),
      config: payload.config || clone(MOCK_CONFIG),
    };
    state.demoSource = payload.meta?.source || 'dashboard-data.json';
    return true;
  } catch { return false; }
}

/* BOOT */
(async () => {
  loadClientState();
  await tryLoadDemoData();
  render();
  await tryRestore();
})();
